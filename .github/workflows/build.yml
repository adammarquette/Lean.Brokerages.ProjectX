name: Build & Test

on:
  push:
    branches: [ master, develop ]  # Only release and development branches
  pull_request:
    branches: [ master, develop ]  # Build feature branches when PR is opened
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  LEAN_REPO: 'https://github.com/adammarquette/Lean.git'
  LEAN_BRANCH: 'master'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
      pull-requests: write
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
    - name: Checkout ProjectX Brokerage
      uses: actions/checkout@v4
      with:
        path: Lean.Brokerages.ProjectX

    - name: Checkout LEAN
      uses: actions/checkout@v4
      with:
        repository: adammarquette/Lean
        ref: ${{ env.LEAN_BRANCH }}
        path: Lean

    - name: Setup .NET 10 Preview
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'preview'

    - name: Restore NuGet packages
      run: dotnet restore Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln

    - name: Build solution
      run: dotnet build Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run tests (Skip live API tests)
      run: |
        dotnet test Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln \
          --configuration ${{ env.CONFIGURATION }} \
          --no-build \
          --verbosity normal \
          --filter "Category!=RequiresApiCredentials&Category!=Integration" \
          --logger "trx;LogFileName=test-results.trx" \
          -- NUnit.NumberOfTestWorkers=0
      continue-on-error: true

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: runner.os == 'Linux'
      with:
        files: '**/test-results.trx'
        check_name: 'Test Results (${{ matrix.os }})'

    - name: Upload build artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage/bin/${{ env.CONFIGURATION }}/
          Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.ToolBox/bin/${{ env.CONFIGURATION }}/
        retention-days: 7

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout ProjectX Brokerage
      uses: actions/checkout@v4
      with:
        path: Lean.Brokerages.ProjectX

    - name: Checkout LEAN
      uses: actions/checkout@v4
      with:
        repository: adammarquette/Lean
        ref: ${{ env.LEAN_BRANCH }}
        path: Lean

    - name: Setup .NET 10 Preview
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'preview'

    - name: Restore NuGet packages
      run: dotnet restore Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln

    - name: Check formatting
      run: dotnet format Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln --verify-no-changes --verbosity diagnostic
      continue-on-error: true

    - name: Run security scan (if applicable)
      run: |
        dotnet list Lean.Brokerages.ProjectX/QuantConnect.ProjectXBrokerage.sln package --vulnerable --include-transitive
      continue-on-error: true

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check for documentation files
      run: |
        echo "Checking for required documentation..."
        test -f README.md && echo "✓ README.md found" || (echo "✗ README.md missing" && exit 1)
        test -f PRD.md && echo "✓ PRD.md found" || echo "⚠ PRD.md missing (optional)"
        test -f CONFIGURATION.md && echo "✓ CONFIGURATION.md found" || echo "⚠ CONFIGURATION.md missing (optional)"
        test -f config-schema.json && echo "✓ config-schema.json found" || echo "⚠ config-schema.json missing (optional)"

    - name: Validate JSON files
      run: |
        echo "Validating JSON configuration files..."
        for file in $(find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/bin/*" -not -path "*/obj/*"); do
          echo "Checking $file..."
          python3 -m json.tool "$file" > /dev/null && echo "✓ Valid JSON" || echo "✗ Invalid JSON in $file"
        done
      continue-on-error: true
