name: Protect Master Branch

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check-actor:
    name: Verify Authorized Committer
    runs-on: ubuntu-latest
    steps:
      - name: Check if actor is authorized
        run: |
          ACTOR="${{ github.actor }}"
          AUTHORIZED="adammarquette"

          if [ "$ACTOR" != "$AUTHORIZED" ]; then
            echo "::error::❌ Unauthorized: '$ACTOR' is not allowed to push directly to master. Only '$AUTHORIZED' may commit to this branch."
            exit 1
          fi

          echo "✅ Authorized actor '$ACTOR' — proceeding."
